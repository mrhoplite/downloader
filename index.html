<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Video Downloader - Fast & Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <header class="sticky top-0 z-40 border-b border-gray-100 bg-white">
        <nav class="mx-auto max-w-screen-2xl px-4 py-2.5 flex justify-between items-center">
            <a href="/" class="text-xl font-semibold text-blue-700">All Video Downloader</a>
            <div class="hidden md:block text-gray-500 text-sm">Professional Media Extraction</div>
        </nav>
    </header>

    <main class="mb-8">
        <section class="bg-gradient-to-b from-blue-50 to-transparent py-12 sm:py-16">
            <div class="flex flex-col items-center gap-4 px-5 text-center">
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-5xl">All Video Downloader</h1>
                <h2 class="text-lg text-gray-500 lg:text-xl">Fast, free, and simple. Save videos from 1,000+ websites</h2>
                
                <div class="mx-auto w-full max-w-5xl mt-8">
                    <div class="flex flex-col gap-y-4 sm:flex-row shadow-lg rounded-lg overflow-hidden border border-blue-200">
                        <input id="videoUrl" class="block w-full border-none bg-white p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none" type="text" placeholder="Paste link here (YouTube, TikTok, Instagram...)">
                        <button id="downloadBtn" class="bg-blue-700 text-white px-8 py-4 hover:bg-blue-800 font-bold transition-all flex items-center justify-center">
                            <span>Download</span>
                        </button>
                    </div>
                </div>

                <div id="result" class="mt-10 hidden w-full max-w-2xl bg-white p-6 rounded-xl border border-gray-200 shadow-xl">
                    <p id="videoTitle" class="font-bold text-gray-800 mb-4 text-lg"></p>
                    <div class="flex flex-col gap-3">
                        <a id="saveLink" href="#" target="_blank" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 font-bold text-center">
                            Download Video File
                        </a>
                        <p class="text-xs text-gray-400 italic">If the video plays instead of downloading, right-click and 'Save Video As'.</p>
                    </div>
                </div>
                
                <div id="loader" class="mt-10 hidden">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mx-auto"></div>
                    <p class="text-blue-700 mt-2 font-medium">Bypassing restrictions...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');

            if (!urlInput) return alert("Please paste a valid link!");

            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                // We point to our local Vercel API
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if (data.url) {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('saveLink').href = data.url;
                    resultDiv.classList.remove('hidden');
                } else {
                    // Show the specific error from Python for debugging
                    alert("Error: " + (data.error || "Could not extract video. The platform might be blocking us."));
                }
            } catch (err) {
                alert("The server is currently being rate-limited. Please try again in 1 minute.");
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
